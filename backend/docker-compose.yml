version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: recon_postgres_synthetic
    restart: always
    environment:
      POSTGRES_USER: recon
      POSTGRES_PASSWORD: recon
      POSTGRES_DB: recon_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
